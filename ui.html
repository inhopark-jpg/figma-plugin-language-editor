<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root {
    --bg: var(--figma-color-bg, #fff);
    --bg-2: var(--figma-color-bg-secondary, #f5f5f5);
    --bg-hover: var(--figma-color-bg-hover, #f0f0f0);
    --bg-sel: var(--figma-color-bg-selected, #e5f0ff);
    --border: var(--figma-color-border, #e6e6e6);
    --text: var(--figma-color-text, #1a1a1a);
    --text-2: var(--figma-color-text-secondary, #888);
    --brand: var(--figma-color-bg-brand, #0d99ff);
    --brand-text: var(--figma-color-text-onbrand, #fff);
    --red: var(--figma-color-text-danger, #f24822);
    --red-bg: var(--figma-color-bg-danger, #fff0ed);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: Inter, -apple-system, system-ui, sans-serif;
    font-size: 11px; color: var(--text); background: var(--bg);
  }
  body { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; flex-direction: column; gap: 8px;
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header .hrow { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  header .hrow.btns { gap: 6px; }
  header .hrow.btns button { flex: 1; }
  header .title { font-weight: 600; font-size: 12px; }
  header .lang-row { justify-content: flex-end; }
  .lang-toggle { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .lang-btn {
    border: none; border-radius: 0; padding: 3px 10px; font-size: 11px;
    background: var(--bg); color: var(--text-2); font-weight: 500; cursor: pointer;
  }
  .lang-btn.active { background: var(--brand); color: var(--brand-text); }
  .lang-btn:hover:not(.active) { background: var(--bg-hover); }

  /* Hide number input spinners */
  input[type="number"] { -webkit-appearance: textfield; -moz-appearance: textfield; appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  main { flex: 1; overflow-y: auto; padding: 12px; position: relative; }

  .muted { color: var(--text-2); }
  .center-msg {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; height: 100%; gap: 10px; color: var(--text-2); padding: 24px;
  }

  .field { margin-bottom: 10px; }
  .field label { display: block; margin-bottom: 4px; color: var(--text-2); }
  .field label .req { color: var(--brand); }
  input[type="text"], input[type="number"], textarea {
    width: 100%; padding: 6px 8px; border: 1px solid var(--border);
    border-radius: 4px; background: var(--bg); color: var(--text);
    font-family: inherit; font-size: 11px; resize: vertical;
  }
  textarea { min-height: 34px; line-height: 1.4; }
  input:focus, textarea:focus { outline: 1px solid var(--brand); border-color: var(--brand); }

  button {
    padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-family: inherit; font-size: 11px;
    cursor: pointer; font-weight: 500;
  }
  button:hover:not(:disabled) { background: var(--bg-hover); }
  button.primary { background: var(--brand); color: var(--brand-text); border-color: var(--brand); }
  button.primary:hover:not(:disabled) { filter: brightness(1.05); }
  button.primary:disabled { opacity: 0.38; cursor: default; }
  button.ghost { border-color: transparent; background: transparent; color: var(--text-2); }
  button.ghost:hover:not(:disabled) { background: var(--bg-hover); }
  button.full { width: 100%; }
  button.sm { padding: 4px 8px; }

  .var-head {
    background: var(--bg-2); border-radius: 6px; padding: 8px 10px; margin-bottom: 12px;
  }
  .var-head .leaf { font-weight: 600; word-break: break-all; }
  .var-head .grp { color: var(--text-2); font-size: 10px; word-break: break-all; margin-top: 2px; }
  .var-head .kind { color: var(--text-2); font-size: 10px; margin-top: 2px; }

  .error-banner {
    display: flex; align-items: flex-start; gap: 8px;
    background: var(--red-bg); border: 1px solid var(--red);
    border-radius: 6px; padding: 8px 10px; margin-bottom: 12px;
    color: var(--red); font-size: 11px; line-height: 1.4;
  }

  .mode-tag {
    display: inline-block; font-size: 10px; color: var(--text-2);
    margin-bottom: 4px; text-transform: uppercase; letter-spacing: .03em;
  }

  .actions { display: flex; gap: 8px; margin-top: 4px; }
  .actions button { flex: 1; }

  .divider { height: 1px; background: var(--border); margin: 14px 0; }

  /* ---- List view ---- */
  /* Sticky header sits inside main (which has padding:12px).
     Negative margins pull it flush to the main edges; top:0 sticks it there. */
  .list-sticky {
    position: sticky;
    top: -12px;
    margin: -12px -12px 0;
    padding: 10px 12px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  .list-sticky .list-nav {
    display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
  }
  .list-sticky .list-nav .grp-label {
    font-size: 10px; color: var(--text-2); flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .list-sticky .list-actions {
    display: flex; gap: 6px; margin-bottom: 8px;
  }
  .list-sticky .list-actions button { flex: 1; }
  .list-body { padding-top: 10px; }

  .list { display: flex; flex-direction: column; gap: 2px; }
  .list-item {
    padding: 7px 9px; border-radius: 6px; cursor: pointer; border: 1px solid transparent;
  }
  .list-item:hover { background: var(--bg-hover); }
  .list-item.current { background: var(--bg-sel); border-color: var(--brand); }
  .list-item .li-leaf { font-weight: 600; word-break: break-all; }
  .list-item .li-val { color: var(--text-2); margin-top: 2px; word-break: break-word; }
  .list-item .li-current-tag { color: var(--brand); font-size: 10px; font-weight: 600; }
  .list-item .li-grp { color: var(--text-2); font-size: 10px; margin-top: 2px; word-break: break-all; }
  .list-section-label {
    font-size: 10px; color: var(--text-2); padding: 8px 2px 4px;
    text-transform: uppercase; letter-spacing: .05em;
  }

  .preview {
    font-family: ui-monospace, Menlo, monospace; background: var(--bg-2);
    padding: 6px 8px; border-radius: 4px; word-break: break-all;
  }
  .back { margin-bottom: 10px; }
</style>
</head>
<body>
  <header>
    <div class="hrow lang-row">
      <div class="lang-toggle">
        <button id="lang-en" class="lang-btn">EN</button>
        <button id="lang-ko" class="lang-btn">한국어</button>
      </div>
    </div>
    <div class="hrow">
      <div class="title">language</div>
    </div>
    <div class="hrow btns">
      <button id="exportcsv" class="sm">Export CSV</button>
      <button id="importcsv" class="sm">Import CSV</button>
    </div>
    <div class="hrow btns">
      <button id="cleanup" class="sm">Clean up variables</button>
    </div>
    <input id="fileinput" type="file" accept=".csv,text/csv" style="display:none" />
  </header>
  <main id="main"></main>

<script>
  const $ = (id) => document.getElementById(id);
  const main = $("main");

  let S = {
    selection: null,
    lang: "en",
    modes: [], defaultModeId: null,
    hasVar: false, varMissing: false, variable: null, bindingKind: null,
    groupPath: "", groupVars: [], allVars: [], recentIds: [], nodeName: "",
    multiCount: 0,
    view: "primary",
    listMode: "swap",
    search: "",
    searchAll: false,
  };

  // ---- i18n ---------------------------------------------------------------
  const I18N = {
    en: {
      exportCsv: "Export CSV",
      importCsv: "Import CSV",
      cleanup: "Clean up variables",
      noCollectionTitle: 'No collection named "language"',
      noCollectionBody: 'Create a variable collection called "language" with string variables to use this plugin.',
      nothingTitle: "Nothing selected",
      nothingBody: "Select a text layer to view or edit its language variable.",
      multipleTitle: "Multiple layers selected",
      multipleBody: "Select only text layers or component instances to work with multiple at once.",
      unsupportedTitle: "Unsupported layer",
      unsupportedBody: "Select a text layer, or a component instance that exposes a text property.",
      varMissingBanner: "Linked variable not found — it may have been deleted. Assign a new one.",
      noVarLinked: "No variable linked",
      groupPrefix: "Group: ",
      pageRoot: "(page root)",
      assignVar: "Assign a variable",
      boundProperty: "Bound via component text property",
      boundText: "Bound via text characters",
      defaultSuffix: " · default",
      aliasNote: "References another variable — not editable here.",
      cancel: "Cancel",
      confirm: "Confirm",
      swapVar: "Swap variable",
      noRecent: "No recent variables. Start typing to search.",
      recent: "Recent",
      noInGroup: "No variables in this group.",
      noMatch: "No variables match your search.",
      current: "current",
      back: "← Back",
      allGroups: "All groups",
      searchPlaceholder: "Search name or value",
      newVariable: "+ New variable",
      searchThisOnly: "← Search this group only",
      searchOutside: "Search outside this group",
      layersSelected: function (n) { return n + " text layer" + (n === 1 ? "" : "s") + " selected"; },
      newVarIn: "New variable in: ",
      required: "Required",
      blankDash: 'Blank → "--"',
      idAssignedNote: "A unique ID will be assigned as this variable's name.",
      createAssign: "Create & assign",
      cleanupComplete: "Cleanup complete",
      cleanupStat: function (p) {
        return p.renamed + " renamed" +
          (p.migrated ? " · " + p.migrated + " given IDs" : "") +
          (p.regrouped ? " · " + p.regrouped + " regrouped" : "") + ".";
      },
      flaggedBanner: function (n) {
        return "⚠️ " + n + " variable" + (n === 1 ? "" : "s") +
          " missing a key layer. Create a text layer at the location shown and link the variable, then run Clean up variables again to clear the flag.";
      },
      del: "Delete",
      brokenHeading: "Text layers with broken link",
      unlink: "Unlink",
      missingHeading: "Variables with missing values",
      missingNote: 'These modes are empty or "--" (untranslated).',
      missingPrefix: "missing: ",
      noGroup: "(no group)",
      noLocation: "(no location)",
      showingSome: function (shown, total) { return "Showing first " + shown + " of " + total + "."; },
      done: "Done",
      importComplete: "Import complete",
      importStat: function (p) {
        return (p.updated || 0) + " variable" + (p.updated === 1 ? "" : "s") + " updated" +
          (p.newModes ? " · " + p.newModes + " new mode" + (p.newModes === 1 ? "" : "s") : "") + ".";
      },
      newModesLabel: "New modes: ",
      unmatchedBanner: function (n) {
        return n + " row" + (n === 1 ? "" : "s") +
          " did not match any variable ID and were skipped — no variables were created.";
      },
      blank: "(blank)",
      importConfirm: "Import a CSV to overwrite variable values.\n\nVariables are matched by their ID (the Variable Name column). Matched rows have their mode values replaced by the file; new mode columns are added. Rows with no matching variable are skipped (nothing new is created). This cannot be undone.",
      cleanupConfirm: 'Clean up every variable in the "language" collection: assign IDs to any without one, re-group moved layers, flag missing key layers, and report missing values. This cannot be undone.',
      csvNoData: "CSV has no data rows.",
      noVarsFound: 'No variables found in "language" collection.',
    },
    ko: {
      exportCsv: "CSV 내보내기",
      importCsv: "CSV 가져오기",
      cleanup: "변수 정리",
      noCollectionTitle: '"language" 컬렉션이 없습니다',
      noCollectionBody: '이 플러그인을 사용하려면 문자열 변수가 있는 "language" 컬렉션을 만드세요.',
      nothingTitle: "선택된 항목 없음",
      nothingBody: "텍스트 레이어를 선택하여 language 변수를 보거나 편집하세요.",
      multipleTitle: "여러 레이어가 선택됨",
      multipleBody: "텍스트 레이어 또는 컴포넌트 인스턴스만 선택하면 여러 개를 한 번에 작업할 수 있습니다.",
      unsupportedTitle: "지원되지 않는 레이어",
      unsupportedBody: "텍스트 레이어 또는 텍스트 속성이 있는 컴포넌트 인스턴스를 선택하세요.",
      varMissingBanner: "연결된 변수를 찾을 수 없습니다 — 삭제되었을 수 있습니다. 새 변수를 지정하세요.",
      noVarLinked: "연결된 변수 없음",
      groupPrefix: "그룹: ",
      pageRoot: "(페이지 루트)",
      assignVar: "변수 지정",
      boundProperty: "컴포넌트 텍스트 속성으로 연결됨",
      boundText: "텍스트 문자로 연결됨",
      defaultSuffix: " · 기본",
      aliasNote: "다른 변수를 참조합니다 — 여기서 편집할 수 없습니다.",
      cancel: "취소",
      confirm: "확인",
      swapVar: "변수 교체",
      noRecent: "최근 변수가 없습니다. 검색하려면 입력하세요.",
      recent: "최근",
      noInGroup: "이 그룹에 변수가 없습니다.",
      noMatch: "검색과 일치하는 변수가 없습니다.",
      current: "현재",
      back: "← 뒤로",
      allGroups: "모든 그룹",
      searchPlaceholder: "이름 또는 값 검색",
      newVariable: "+ 새 변수",
      searchThisOnly: "← 이 그룹만 검색",
      searchOutside: "이 그룹 외부 검색",
      layersSelected: function (n) { return "텍스트 레이어 " + n + "개 선택됨"; },
      newVarIn: "새 변수 위치: ",
      required: "필수",
      blankDash: '비워두면 → "--"',
      idAssignedNote: "이 변수의 이름으로 고유 ID가 지정됩니다.",
      createAssign: "생성 및 적용",
      cleanupComplete: "정리 완료",
      cleanupStat: function (p) {
        return "이름 변경 " + p.renamed + "개" +
          (p.migrated ? " · ID 부여 " + p.migrated + "개" : "") +
          (p.regrouped ? " · 그룹 변경 " + p.regrouped + "개" : "") + ".";
      },
      flaggedBanner: function (n) {
        return "⚠️ 변수 " + n + "개에 키 레이어가 없습니다. 표시된 위치에 텍스트 레이어를 만들고 변수를 연결한 다음 변수 정리를 다시 실행하면 플래그가 사라집니다.";
      },
      del: "삭제",
      brokenHeading: "연결이 끊긴 텍스트 레이어",
      unlink: "연결 해제",
      missingHeading: "값이 누락된 변수",
      missingNote: '이 모드는 비어 있거나 "--"입니다 (미번역).',
      missingPrefix: "누락: ",
      noGroup: "(그룹 없음)",
      noLocation: "(위치 없음)",
      showingSome: function (shown, total) { return total + "개 중 " + shown + "개 표시."; },
      done: "완료",
      importComplete: "가져오기 완료",
      importStat: function (p) {
        return "변수 " + (p.updated || 0) + "개 업데이트됨" +
          (p.newModes ? " · 새 모드 " + p.newModes + "개" : "") + ".";
      },
      newModesLabel: "새 모드: ",
      unmatchedBanner: function (n) {
        return "변수 ID와 일치하지 않는 행 " + n + "개를 건너뛰었습니다 — 새 변수는 생성되지 않았습니다.";
      },
      blank: "(비어 있음)",
      importConfirm: "CSV를 가져와 변수 값을 덮어씁니다.\n\n변수는 ID(Variable Name 열)로 매칭됩니다. 일치하는 행은 파일의 값으로 모드 값이 교체되고, 새 모드 열은 추가됩니다. 일치하는 변수가 없는 행은 건너뜁니다(새로 생성되지 않음). 이 작업은 되돌릴 수 없습니다.",
      cleanupConfirm: '"language" 컬렉션의 모든 변수를 정리합니다: ID가 없는 변수에 ID 부여, 이동된 레이어 재그룹화, 키 레이어 없음 표시, 누락된 값 보고. 이 작업은 되돌릴 수 없습니다.',
      csvNoData: "CSV에 데이터 행이 없습니다.",
      noVarsFound: '"language" 컬렉션에 변수가 없습니다.',
    },
  };

  function t(key) {
    const dict = I18N[S.lang] || I18N.en;
    let v = dict[key];
    if (v == null) v = I18N.en[key];
    return v == null ? key : v;
  }

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function post(msg) { parent.postMessage({ pluginMessage: msg }, "*"); }

  // ---- incoming -----------------------------------------------------------
  onmessage = (e) => {
    const msg = e.data.pluginMessage;
    if (!msg) return;
    if (msg.type === "state") {
      Object.assign(S, {
        selection:    msg.selection,
        modes:        msg.modes || [],
        defaultModeId: msg.defaultModeId || null,
        hasVar:       !!msg.hasVar,
        varMissing:   !!msg.varMissing,
        variable:     msg.variable || null,
        bindingKind:  msg.bindingKind || null,
        groupPath:    msg.groupPath || "",
        groupVars:    msg.groupVars || [],
        allVars:      msg.allVars || [],
        recentIds:    msg.recentIds || [],
        multiCount:   msg.count || 0,
        nodeName:     msg.nodeName || "",
      });
      if (msg.lang) S.lang = msg.lang;
      S.view = "primary";
      S.search = "";
      S.searchAll = false;
      applyLang();
    } else if (msg.type === "export-data") {
      if (!msg.vars || !msg.vars.length) {
        post({ type: "notify", message: t("noVarsFound") });
        return;
      }
      downloadCSV(generateCSV(msg.vars, msg.modes));
    } else if (msg.type === "cleanup-result") {
      renderReport(msg);
    } else if (msg.type === "import-result") {
      renderImportReport(msg);
    }
  };

  // ---- render -------------------------------------------------------------
  function render() {
    if (S.selection === "no-collection") return renderMessage(
      t("noCollectionTitle"), t("noCollectionBody")
    );
    if (S.selection === "none") return renderMessage(
      t("nothingTitle"), t("nothingBody")
    );
    if (S.selection === "multiple") return renderMessage(
      t("multipleTitle"), t("multipleBody")
    );
    if (S.selection === "unsupported") return renderMessage(
      t("unsupportedTitle"), t("unsupportedBody")
    );
    if (S.selection === "multi-node") return renderMulti();
    if (S.selection !== "node") return renderMessage("…", "");

    if (S.view === "list")   return renderList(true);
    if (S.view === "create") return renderCreate();
    return renderPrimary();
  }

  function renderMessage(title, body) {
    main.innerHTML =
      '<div class="center-msg"><div style="font-weight:600;color:var(--text)">' +
      esc(title) + '</div><div>' + esc(body) + "</div></div>";
  }

  // ---- primary view -------------------------------------------------------
  function renderPrimary() {
    if (S.hasVar) return renderEdit();

    let html = "";

    if (S.varMissing) {
      html +=
        '<div class="error-banner">' +
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;margin-top:1px">' +
        '<path d="M8 2L14 13H2L8 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>' +
        '<path d="M8 6.5V9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>' +
        '<circle cx="8" cy="11.5" r="0.75" fill="currentColor"/>' +
        '</svg>' +
        '<span>' + esc(t("varMissingBanner")) + '</span>' +
        "</div>";
    } else {
      html +=
        '<div class="var-head"><div class="leaf">' + esc(t("noVarLinked")) + '</div>' +
        '<div class="grp">' + esc(t("groupPrefix")) + esc(S.groupPath || t("pageRoot")) + "</div></div>";
    }

    html += '<button id="assign" class="primary full">' + esc(t("assignVar")) + '</button>';
    main.innerHTML = html;
    $("assign").onclick = () => { S.listMode = "assign"; S.view = "list"; S.search = ""; render(); };
  }

  // ---- edit view ----------------------------------------------------------
  function renderEdit() {
    const v = S.variable;
    const titleVal = v.valuesByMode[S.defaultModeId];
    let html =
      '<div class="var-head">' +
      '<div class="leaf">' + esc(typeof titleVal === "string" && titleVal !== "" ? titleVal : "—") + "</div>" +
      '<div class="grp">ID ' + esc(v.varId || v.leaf) + " · " + esc(v.group || t("pageRoot")) + "</div>" +
      '<div class="kind">' +
      esc(S.bindingKind === "property" ? t("boundProperty") : t("boundText")) +
      "</div></div>";

    // Capture original values to drive confirm-button disabled state.
    const originals = {};
    for (let i = 0; i < S.modes.length; i++) {
      const m = S.modes[i];
      const raw = v.valuesByMode[m.modeId];
      originals[m.modeId] = typeof raw === "string" ? raw : null;
    }

    html += '<div id="modes">';
    for (let i = 0; i < S.modes.length; i++) {
      const m = S.modes[i];
      const val = v.valuesByMode[m.modeId];
      const isAlias = val === null;
      html +=
        '<div class="field">' +
        '<span class="mode-tag">' + esc(m.name) + (m.isDefault ? esc(t("defaultSuffix")) : "") + "</span>" +
        '<textarea data-mode="' + m.modeId + '"' + (isAlias ? " disabled" : "") + ">" +
        esc(isAlias ? "" : val) + "</textarea>" +
        (isAlias ? '<div class="muted" style="margin-top:4px">' + esc(t("aliasNote")) + '</div>' : "") +
        "</div>";
    }
    html += "</div>";

    html +=
      '<div class="actions">' +
      '<button id="cancel">' + esc(t("cancel")) + '</button>' +
      '<button id="confirm" class="primary" disabled>' + esc(t("confirm")) + '</button>' +
      "</div>" +
      '<div class="divider"></div>' +
      '<button id="swap" class="full">' + esc(t("swapVar")) + '</button>';

    main.innerHTML = html;

    const confirmBtn = $("confirm");

    // Enable confirm only when at least one editable field has changed.
    const checkChanged = () => {
      let changed = false;
      const areas = main.querySelectorAll("textarea[data-mode]");
      for (let i = 0; i < areas.length; i++) {
        const t = areas[i];
        if (!t.disabled && t.value !== (originals[t.getAttribute("data-mode")] || "")) {
          changed = true;
          break;
        }
      }
      confirmBtn.disabled = !changed;
    };

    const areas = main.querySelectorAll("textarea[data-mode]");
    for (let i = 0; i < areas.length; i++) {
      areas[i].oninput = checkChanged;
    }

    $("cancel").onclick = () => render();
    confirmBtn.onclick = () => {
      const values = {};
      const all = main.querySelectorAll("textarea[data-mode]");
      for (let i = 0; i < all.length; i++) {
        if (!all[i].disabled) values[all[i].getAttribute("data-mode")] = all[i].value;
      }
      post({ type: "save", values });
    };
    $("swap").onclick = () => { S.listMode = "swap"; S.view = "list"; S.search = ""; render(); };
  }

  // ---- list view ----------------------------------------------------------
  function matchesSearch(v, q) {
    if (!q) return true;
    q = q.toLowerCase();
    if (v.leaf.toLowerCase().includes(q) || v.name.toLowerCase().includes(q)) return true;
    for (const mid in v.valuesByMode) {
      const val = v.valuesByMode[mid];
      if (typeof val === "string" && val.toLowerCase().includes(q)) return true;
    }
    return false;
  }

  // Renders only the scrollable list body — called on every search keystroke
  // without touching the sticky header, so the <input> is never destroyed
  // and Korean IME composition works correctly.
  function renderListBody() {
    const listBody = $("list-body");
    if (!listBody) return;

    const isMulti   = S.selection === "multi-node";
    const isAllMode = isMulti || S.searchAll;
    const swapMsg   = isMulti ? "multi-swap" : "swap";
    const currentId = S.variable ? S.variable.id : null;

    let vars, sectionLabel = null;

    if (isAllMode && !S.search) {
      // No search query — show recently used variables ordered by recency.
      const recentOrder = {};
      for (let i = 0; i < S.recentIds.length; i++) recentOrder[S.recentIds[i]] = i;
      vars = S.allVars
        .filter(v => Object.prototype.hasOwnProperty.call(recentOrder, v.id))
        .sort((a, b) => recentOrder[a.id] - recentOrder[b.id]);
      if (vars.length === 0) {
        listBody.innerHTML =
          '<div class="muted" style="padding:4px 2px">' + esc(t("noRecent")) + '</div>';
        return;
      }
      sectionLabel = t("recent");
    } else {
      vars = (isAllMode ? S.allVars : S.groupVars).filter(v => matchesSearch(v, S.search));
      if (vars.length === 0) {
        const noVarsAtAll = !isAllMode && S.groupVars.length === 0;
        listBody.innerHTML =
          '<div class="muted" style="padding:4px 2px">' +
          esc(noVarsAtAll ? t("noInGroup") : t("noMatch")) +
          "</div>";
        return;
      }
    }

    const defId = S.defaultModeId;
    let html = sectionLabel
      ? '<div class="list-section-label">' + esc(sectionLabel) + "</div>"
      : "";
    html += '<div class="list">';
    for (let i = 0; i < vars.length; i++) {
      const v = vars[i];
      const isCurrent = !isMulti && v.id === currentId;
      const preview = v.valuesByMode[defId];
      const idLabel = v.varId || v.leaf;
      html +=
        '<div class="list-item' + (isCurrent ? " current" : "") + '" data-id="' + v.id + '">' +
        '<div class="li-leaf">' + esc(typeof preview === "string" && preview !== "" ? preview : "—") +
        (isCurrent ? ' <span class="li-current-tag">' + esc(t("current")) + '</span>' : "") + "</div>" +
        '<div class="li-val">' + esc(idLabel) +
        (isAllMode ? " · " + esc(v.group || t("pageRoot")) : "") + "</div>" +
        "</div>";
    }
    html += "</div>";

    listBody.innerHTML = html;
    listBody.querySelectorAll(".list-item").forEach((el) => {
      el.onclick = () => post({ type: swapMsg, variableId: el.getAttribute("data-id") });
    });
  }

  function renderList(scrollToCurrent) {
    const currentId = S.variable ? S.variable.id : null;

    // Sticky header — rebuilt once per navigation; stable DOM so IME is not disrupted.
    let html =
      '<div class="list-sticky">' +
      '<div class="list-nav">' +
      '<button id="back" class="ghost sm">' + esc(t("back")) + '</button>' +
      '<span class="grp-label">' + esc(S.searchAll ? t("allGroups") : (t("groupPrefix") + (S.groupPath || t("pageRoot")))) + "</span>" +
      "</div>" +
      '<div class="list-actions">' +
      '<input id="search" type="text" placeholder="' + esc(t("searchPlaceholder")) + '" value="' + esc(S.search) + '" />' +
      '<button id="create" class="primary sm" style="white-space:nowrap">' + esc(t("newVariable")) + '</button>' +
      "</div>" +
      '<button id="toggleScope" class="ghost sm" style="width:100%;text-align:left;padding:3px 2px">' +
      esc(S.searchAll ? t("searchThisOnly") : t("searchOutside")) +
      "</button>" +
      "</div>" +
      '<div id="list-body" class="list-body"></div>';

    main.innerHTML = html;

    $("back").onclick = () => { S.view = "primary"; S.searchAll = false; render(); };
    $("create").onclick = () => { S.view = "create"; render(); };
    $("toggleScope").onclick = () => { S.searchAll = !S.searchAll; renderList(false); };

    // Wire up search with IME support: never re-render the sticky header,
    // only update the list body via renderListBody().
    const search = $("search");
    let composing = false;
    search.addEventListener("compositionstart", () => { composing = true; });
    search.addEventListener("compositionend", () => {
      composing = false;
      S.search = search.value;
      renderListBody();
    });
    search.addEventListener("input", () => {
      if (composing) return;
      S.search = search.value;
      renderListBody();
    });

    renderListBody();

    // Center the active variable in the list only on first open.
    if (scrollToCurrent && S.listMode === "swap" && currentId) {
      const cur = main.querySelector(".list-item.current");
      if (cur) cur.scrollIntoView({ block: "center" });
    }
  }

  // ---- multi-select view --------------------------------------------------
  // Shown when multiple valid text/instance layers are selected.
  // Always operates in "all vars" mode — no group filter, no create button.
  function renderMulti() {
    const count = S.multiCount;
    let html =
      '<div class="list-sticky">' +
      '<div class="list-nav" style="margin-bottom:8px">' +
      '<span style="font-weight:600;font-size:12px">' +
      esc(t("layersSelected")(count)) +
      "</span>" +
      "</div>" +
      '<div class="list-actions">' +
      '<input id="search" type="text" placeholder="' + esc(t("searchPlaceholder")) + '" value="' + esc(S.search) + '" />' +
      "</div>" +
      "</div>" +
      '<div id="list-body" class="list-body"></div>';

    main.innerHTML = html;

    const search = $("search");
    let composing = false;
    search.addEventListener("compositionstart", () => { composing = true; });
    search.addEventListener("compositionend", () => {
      composing = false; S.search = search.value; renderListBody();
    });
    search.addEventListener("input", () => {
      if (composing) return; S.search = search.value; renderListBody();
    });

    renderListBody();
  }

  // ---- create view --------------------------------------------------------
  function renderCreate() {
    let html =
      '<button id="back" class="ghost sm back">' + esc(t("back")) + '</button>' +
      '<div class="field"><span class="mode-tag">' + esc(t("newVarIn")) +
      esc(S.groupPath || t("pageRoot")) + "</span></div>";

    for (let i = 0; i < S.modes.length; i++) {
      const m = S.modes[i];
      html +=
        '<div class="field">' +
        '<label>' + esc(m.name) +
        (m.isDefault ? esc(t("defaultSuffix")) + ' <span class="req">*</span>' : "") + "</label>" +
        '<textarea data-mode="' + m.modeId + '" data-default="' + (m.isDefault ? "1" : "") +
        '" placeholder="' + esc(m.isDefault ? t("required") : t("blankDash")) + '"></textarea>' +
        "</div>";
    }

    html +=
      '<div class="muted" style="margin-bottom:10px">' + esc(t("idAssignedNote")) + '</div>' +
      '<button id="createBtn" class="primary full">' + esc(t("createAssign")) + '</button>';

    main.innerHTML = html;

    $("back").onclick = () => { S.view = "list"; render(); };
    $("createBtn").onclick = () => {
      const values = {};
      const areas = main.querySelectorAll("textarea[data-mode]");
      for (let i = 0; i < areas.length; i++) {
        values[areas[i].getAttribute("data-mode")] = areas[i].value;
      }
      post({ type: "create", values });
    };
  }

  // ---- cleanup report -----------------------------------------------------
  // Shown after "Clean up variables" when one or more variables are missing
  // their key layer. Lists where each one expects its key so it can be re-made.
  // Each missing-key item has a Delete button that removes the variable in place.
  function renderReport(r) {
    S.reportFlagged = (r.flagged       || []).slice();
    S.reportBroken  = (r.brokenNodes   || []).slice();
    S.reportMissing = (r.missingValues || []).slice();
    S.reportTotals  = {
      flagged: r.flaggedTotal != null ? r.flaggedTotal : (r.flagged || []).length,
      broken:  r.brokenTotal  != null ? r.brokenTotal  : (r.brokenNodes || []).length,
      missing: r.missingTotal != null ? r.missingTotal : (r.missingValues || []).length,
    };
    S.reportStats   = { renamed: r.renamed, regrouped: r.regrouped || 0, migrated: r.migrated || 0 };
    renderReportView();
  }

  function cappedNote(shown, total) {
    return total > shown
      ? '<div class="muted" style="padding:4px 2px">' + esc(t("showingSome")(shown, total)) + "</div>"
      : "";
  }

  function renderReportView() {
    const r       = S.reportStats   || { renamed: 0, regrouped: 0, migrated: 0 };
    const flagged = S.reportFlagged || [];
    const broken  = S.reportBroken  || [];
    const missing = S.reportMissing || [];
    const totals  = S.reportTotals  || { flagged: flagged.length, broken: broken.length, missing: missing.length };

    let html = '<div style="font-weight:600;font-size:12px;margin-bottom:6px">' + esc(t("cleanupComplete")) + '</div>';
    html += '<div class="muted" style="margin-bottom:10px">' + esc(t("cleanupStat")(r)) + "</div>";

    if (flagged.length) {
      html +=
        '<div class="error-banner" style="display:block">' +
        esc(t("flaggedBanner")(flagged.length)) +
        "</div>";
      html += '<div class="list" style="margin-top:8px">';
      for (let i = 0; i < flagged.length; i++) {
        const f = flagged[i];
        html +=
          '<div class="list-item" style="cursor:default;display:flex;align-items:center;gap:8px">' +
          '<div style="flex:1;min-width:0">' +
          '<div class="li-leaf">⚠️ ' + esc(f.leaf) + "</div>" +
          '<div class="li-grp">' + esc(f.group || t("noGroup")) + "</div>" +
          "</div>" +
          '<button class="sm" style="color:var(--red);border-color:var(--red);flex-shrink:0" data-del="' + i + '">' + esc(t("del")) + '</button>' +
          "</div>";
      }
      html += "</div>";
      html += cappedNote(flagged.length, totals.flagged);
    }

    if (broken.length) {
      html += '<div style="font-weight:600;font-size:11px;margin-top:' + (flagged.length ? "14px" : "0") + ';margin-bottom:6px">' + esc(t("brokenHeading")) + '</div>';
      html += '<div class="list">';
      for (let i = 0; i < broken.length; i++) {
        const b = broken[i];
        html +=
          '<div class="list-item" style="cursor:pointer;display:flex;align-items:center;gap:8px" data-nav="' + esc(b.nodeId) + '">' +
          '<div style="flex:1;min-width:0">' +
          '<div class="li-leaf">' + esc(b.nodeName) + "</div>" +
          '<div class="li-grp">' + esc(b.groupPath || t("noGroup")) + "</div>" +
          "</div>" +
          '<button class="sm" style="flex-shrink:0" data-unlink="' + i + '">' + esc(t("unlink")) + '</button>' +
          "</div>";
      }
      html += "</div>";
      html += cappedNote(broken.length, totals.broken);
    }

    if (missing.length) {
      html += '<div style="font-weight:600;font-size:11px;margin-top:' + ((flagged.length || broken.length) ? "14px" : "0") + ';margin-bottom:6px">' + esc(t("missingHeading")) + '</div>';
      html += '<div class="muted" style="margin-bottom:6px">' + esc(t("missingNote")) + '</div>';
      html += '<div class="list">';
      for (let i = 0; i < missing.length; i++) {
        const m = missing[i];
        html +=
          '<div class="list-item" style="cursor:default">' +
          '<div class="li-leaf">' + esc(m.id) + "</div>" +
          '<div class="li-grp">' + esc(m.group || t("noGroup")) + " · " + esc(t("missingPrefix")) + esc(m.modes.join(", ")) + "</div>" +
          "</div>";
      }
      html += "</div>";
      html += cappedNote(missing.length, totals.missing);
    }

    html += '<div class="divider"></div><button id="reportDone" class="primary full">' + esc(t("done")) + '</button>';
    main.innerHTML = html;

    main.querySelectorAll("[data-del]").forEach((btn) => {
      btn.onclick = () => {
        const idx = parseInt(btn.getAttribute("data-del"), 10);
        const f = S.reportFlagged[idx];
        if (!f) return;
        post({ type: "delete-var", variableId: f.id });
        S.reportFlagged.splice(idx, 1);
        if (S.reportTotals) S.reportTotals.flagged = Math.max(0, S.reportTotals.flagged - 1);
        renderReportView();
      };
    });

    main.querySelectorAll("[data-nav]").forEach((item) => {
      item.onclick = () => post({ type: "navigate-to-node", nodeId: item.getAttribute("data-nav") });
    });

    main.querySelectorAll("[data-unlink]").forEach((btn) => {
      btn.onclick = (e) => {
        e.stopPropagation(); // prevent row click from also navigating
        const idx = parseInt(btn.getAttribute("data-unlink"), 10);
        const b = S.reportBroken[idx];
        if (!b) return;
        post({ type: "unlink-node", nodeId: b.nodeId });
        S.reportBroken.splice(idx, 1);
        if (S.reportTotals) S.reportTotals.broken = Math.max(0, S.reportTotals.broken - 1);
        renderReportView();
      };
    });

    $("reportDone").onclick = () => post({ type: "refresh" });
  }

  // ---- CSV export ---------------------------------------------------------
  function parseGroupPath(groupPath) {
    var sections = [], layer = "";
    if (!groupPath) return { sections: sections, layer: layer };
    var parts = groupPath.split("/");
    for (var i = 0; i < parts.length; i++) {
      if (parts[i].indexOf("section-") === 0) sections.push(parts[i].slice(8));
      else if (parts[i].indexOf("layer-") === 0) layer = parts[i].slice(6);
    }
    return { sections: sections, layer: layer };
  }

  function csvCell(s) {
    s = String(s == null ? "" : s);
    if (s.search(/[,"\r\n]/) !== -1) s = '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function generateCSV(vars, modes) {
    var sorted = vars.slice().sort(function(a, b) {
      var na = (a.group || "") + "/" + a.leaf;
      var nb = (b.group || "") + "/" + b.leaf;
      return na < nb ? -1 : na > nb ? 1 : 0;
    });
    var rows = [];
    var header = ["1st Section", "2nd Section", "3rd Section", "Layer Name", "Variable Name"];
    for (var i = 0; i < modes.length; i++) header.push(modes[i].name);
    rows.push(header.map(csvCell).join(","));
    for (var vi = 0; vi < sorted.length; vi++) {
      var v = sorted[vi];
      var parsed = parseGroupPath(v.group);
      var row = [
        parsed.sections[0] || "",
        parsed.sections[1] || "",
        parsed.sections[2] || "",
        parsed.layer || "",
        v.leaf.replace(/^⚠️\s*/, ""),
      ];
      for (var mi = 0; mi < modes.length; mi++) {
        var val = v.valuesByMode[modes[mi].modeId];
        row.push(typeof val === "string" ? val : "");
      }
      rows.push(row.map(csvCell).join(","));
    }
    return rows.join("\r\n");
  }

  function downloadCSV(content) {
    var blob = new Blob(["﻿" + content], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "language-variables.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  $("exportcsv").onclick = () => post({ type: "export-csv" });

  // ---- CSV import ---------------------------------------------------------
  // Parser handles quoted fields, escaped quotes (""), embedded commas/newlines,
  // and a leading UTF-8 BOM. Returns an array of row arrays.
  function parseCSV(text) {
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
    const rows = [];
    let row = [], field = "", inQuotes = false, i = 0;
    while (i < text.length) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i += 2; continue; }
          inQuotes = false; i++; continue;
        }
        field += c; i++; continue;
      }
      if (c === '"') { inQuotes = true; i++; continue; }
      if (c === ",") { row.push(field); field = ""; i++; continue; }
      if (c === "\r") { i++; continue; }
      if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; i++; continue; }
      field += c; i++;
    }
    if (field !== "" || row.length) { row.push(field); rows.push(row); }
    // Drop fully-empty rows.
    return rows.filter(r => r.some(cell => String(cell).trim() !== ""));
  }

  $("importcsv").onclick = () => {
    if (!confirm(t("importConfirm"))) {
      return;
    }
    $("fileinput").click();
  };

  $("fileinput").onchange = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const rows = parseCSV(String(reader.result || ""));
      $("fileinput").value = ""; // allow re-picking the same file
      if (rows.length < 2) {
        post({ type: "notify", message: t("csvNoData") });
        return;
      }
      post({ type: "import-csv", headers: rows[0], rows: rows.slice(1) });
    };
    reader.readAsText(file);
  };

  // ---- import report ------------------------------------------------------
  function renderImportReport(r) {
    let html = '<div style="font-weight:600;font-size:12px;margin-bottom:6px">' + esc(t("importComplete")) + '</div>';
    html += '<div class="muted" style="margin-bottom:10px">' +
      esc(t("importStat")({ updated: r.updated, newModes: r.newModes ? r.newModes.length : 0 })) + "</div>";

    if (r.newModes && r.newModes.length) {
      html += '<div class="muted" style="margin-bottom:10px">' + esc(t("newModesLabel")) + r.newModes.map(esc).join(", ") + "</div>";
    }

    if (r.unmatched && r.unmatched.length) {
      html +=
        '<div class="error-banner" style="display:block">' +
        esc(t("unmatchedBanner")(r.unmatched.length)) +
        "</div>";
      html += '<div class="list" style="margin-top:8px">';
      for (let i = 0; i < r.unmatched.length; i++) {
        const u = r.unmatched[i];
        const loc = [u.section1, u.section2, u.section3, u.layer].filter(Boolean).join(" / ");
        html +=
          '<div class="list-item" style="cursor:default">' +
          '<div class="li-leaf">' + esc(u.variableName || t("blank")) + "</div>" +
          '<div class="li-grp">' + esc(loc || t("noLocation")) + "</div>" +
          "</div>";
      }
      html += "</div>";
    }

    html += '<div class="divider"></div><button id="reportDone" class="primary full">' + esc(t("done")) + '</button>';
    main.innerHTML = html;
    $("reportDone").onclick = () => post({ type: "refresh" });
  }

  // ---- header tools -------------------------------------------------------
  $("cleanup").onclick = () => {
    if (confirm(t("cleanupConfirm"))) {
      post({ type: "cleanup" });
    }
  };

  // ---- language toggle ----------------------------------------------------
  // Updates the static header labels + toggle state, then re-renders the body.
  function applyLang() {
    $("exportcsv").textContent = t("exportCsv");
    $("importcsv").textContent = t("importCsv");
    $("cleanup").textContent = t("cleanup");
    $("lang-en").classList.toggle("active", S.lang === "en");
    $("lang-ko").classList.toggle("active", S.lang === "ko");
    render();
  }

  function setLang(lang) {
    if (S.lang === lang) return;
    S.lang = lang;
    post({ type: "set-lang", lang: lang });
    applyLang();
  }
  $("lang-en").onclick = () => setLang("en");
  $("lang-ko").onclick = () => setLang("ko");

  applyLang(); // initial labels before the first state arrives
  post({ type: "ready" });
</script>
</body>
